<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Reported Domains — Phishing Detector</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap');

    :root {
      --bg:     #0d0f14;
      --panel:  #13161e;
      --border: #1e2330;
      --danger: #ff3c5a;
      --safe:   #00e5a0;
      --warn:   #ffb547;
      --muted:  #4a5168;
      --text:   #e8eaf0;
      --mono:   'Share Tech Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 30px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo { font-size: 28px; }

    .title { font-size: 20px; font-weight: 800; letter-spacing: .04em; }
    .subtitle { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      padding: 9px 18px;
      border-radius: 7px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      transition: all .2s;
      border: 1px solid var(--border);
    }

    .btn-export {
      background: rgba(0,229,160,.08);
      border-color: rgba(0,229,160,.3);
      color: var(--safe);
    }
    .btn-export:hover { background: rgba(0,229,160,.15); }

    .btn-clear {
      background: rgba(255,60,90,.06);
      border-color: rgba(255,60,90,.2);
      color: var(--danger);
    }
    .btn-clear:hover { background: rgba(255,60,90,.14); }

    .btn:disabled { opacity: .35; cursor: default; }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 22px;
    }

    .stat-pill {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stat-num {
      font-size: 22px;
      font-weight: 800;
      font-family: var(--mono);
      color: var(--danger);
    }

    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }

    /* ── Search bar ── */
    .search-row {
      margin-bottom: 16px;
      display: flex;
      gap: 10px;
    }

    .search-input {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 9px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      outline: none;
      transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--danger); }
    .search-input::placeholder { color: var(--muted); }

    /* ── Table ── */
    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: #0d0f14;
      border-bottom: 2px solid var(--border);
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    th:hover { color: var(--text); }
    th .sort-icon { margin-left: 4px; opacity: .4; }
    th.active .sort-icon { opacity: 1; color: var(--danger); }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,60,90,.03); }

    td {
      padding: 13px 16px;
      font-size: 13px;
      vertical-align: middle;
    }

    .domain-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .domain-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 6px var(--danger);
      flex-shrink: 0;
    }

    .domain-name {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      font-weight: 600;
    }

    .date-cell {
      font-family: var(--mono);
      font-size: 12px;
      color: #8b93b0;
    }

    .visits-cell {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
    }

    .visits-cell.high  { color: var(--danger); }
    .visits-cell.med   { color: var(--warn); }
    .visits-cell.low   { color: var(--muted); }

    .remove-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 11px;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: all .2s;
    }
    .remove-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(255,60,90,.06);
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 40px; margin-bottom: 14px; }
    .empty-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
    .empty-sub { font-size: 12px; font-family: var(--mono); line-height: 1.6; }

    /* ── Toast notification ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--panel);
      border: 1px solid var(--safe);
      color: var(--safe);
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 12px;
      font-family: var(--mono);
      opacity: 0;
      transform: translateY(10px);
      transition: all .3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 11px;
      font-family: var(--mono);
      text-decoration: none;
      margin-bottom: 20px;
      transition: color .2s;
    }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <div class="logo">🚩</div>
      <div>
        <div class="title">Reported Domains</div>
        <div class="subtitle">Your personal phishing blocklist</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-export" id="exportBtn" disabled>⬇ Export to CSV</button>
      <button class="btn btn-clear" id="clearAllBtn" disabled>🗑 Clear All</button>
    </div>
  </div>

  <div class="search-row">
    <input class="search-input" id="searchInput" type="text" placeholder="Search domains…"/>
  </div>

  <div class="table-wrap">
    <table id="reportsTable">
      <thead>
        <tr>
          <th id="sortDomain" class="active">Domain <span class="sort-icon">↕</span></th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tableBody">
      </tbody>
    </table>
  </div>

  <div class="toast" id="toast"></div>

  <script src="reports.js"></script>
</body>
</html>
