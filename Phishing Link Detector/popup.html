<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Phishing Detector</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap');

    :root {
      --bg:      #0d0f14;
      --panel:   #13161e;
      --border:  #1e2330;
      --safe:    #00e5a0;
      --danger:  #ff3c5a;
      --warn:    #ffb547;
      --muted:   #4a5168;
      --text:    #e8eaf0;
      --mono:    'Share Tech Mono', monospace;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      width: 340px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      padding: 13px 15px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon { font-size: 20px; }
    .header-title { font-size: 12px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; }
    .header-sub { font-size: 10px; color: var(--muted); font-family: var(--mono); margin-top: 1px; }

    /* ── Mode badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 10px;
      font-family: var(--mono);
      margin: 10px 14px 0;
    }
    .badge.chatbot {
      background: rgba(0,229,160,.08);
      border: 1px solid rgba(0,229,160,.25);
      color: var(--safe);
    }
    .badge.general {
      background: rgba(74,81,104,.15);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .badge .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--safe);
      box-shadow: 0 0 5px var(--safe);
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ── Status banner ── */
    .status {
      margin: 10px 14px 0;
      border-radius: 10px;
      padding: 11px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--border);
    }
    .status.safe   { border-color: var(--safe);   background: rgba(0,229,160,.06); }
    .status.danger { border-color: var(--danger);  background: rgba(255,60,90,.06); }
    .status.warn   { border-color: var(--warn);   background: rgba(255,181,71,.06); }
    .status.idle   { border-color: var(--border); background: var(--panel); }

    .status-icon { font-size: 22px; flex-shrink: 0; }
    .status-label { font-size: 15px; font-weight: 800; }
    .status-desc  { font-size: 10px; color: var(--muted); font-family: var(--mono); margin-top: 2px; line-height: 1.4; }

    .status.safe   .status-label { color: var(--safe); }
    .status.danger .status-label { color: var(--danger); }
    .status.warn   .status-label { color: var(--warn); }
    .status.idle   .status-label { color: var(--muted); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .scanning { animation: pulse 1.1s ease-in-out infinite; }

    /* ── Stats row ── */
    .stats { display: flex; gap: 7px; margin: 10px 14px 0; }
    .stat {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 8px;
      text-align: center;
    }
    .stat-n { font-size: 19px; font-weight: 800; font-family: var(--mono); line-height: 1; }
    .stat-n.red   { color: var(--danger); }
    .stat-n.green { color: var(--safe); }
    .stat-n.grey  { color: var(--muted); }
    .stat-l { font-size: 9px; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-top: 3px; }

    /* ── Section title ── */
    .section-title {
      font-size: 9px; text-transform: uppercase;
      letter-spacing: .1em; color: var(--muted);
      padding: 11px 14px 5px;
    }

    /* ── Flagged links list ── */
    .links-list {
      margin: 0 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      max-height: 220px;
      overflow-y: auto;
    }
    .links-list::-webkit-scrollbar { width: 3px; }
    .links-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .empty { padding: 16px; text-align: center; color: var(--muted); font-size: 11px; font-family: var(--mono); }

    /* ── Individual link item ── */
    .link-item {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .link-item:last-child { border-bottom: none; }

    .link-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      transition: background .15s;
    }
    .link-row:hover { background: rgba(255,60,90,.04); }

    .link-dot {
      width: 6px; height: 6px; flex-shrink: 0;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 5px var(--danger);
    }
    .link-url {
      flex: 1;
      font-family: var(--mono);
      font-size: 10px;
      color: #8b93b0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .link-score {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 800;
      color: var(--danger);
      flex-shrink: 0;
    }
    .link-arrow {
      font-size: 9px;
      color: var(--muted);
      flex-shrink: 0;
      transition: transform .2s;
    }
    .link-item.expanded .link-arrow { transform: rotate(90deg); }

    /* ── XAI Reasons panel ── */
    .reasons-panel {
      display: none;
      padding: 0 10px 10px 24px;
    }
    .link-item.expanded .reasons-panel { display: block; }

    .reasons-title {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 5px;
      padding-top: 2px;
    }

    .reason-row {
      display: flex;
      gap: 7px;
      align-items: flex-start;
      margin-bottom: 5px;
    }
    .reason-dot { font-size: 8px; flex-shrink: 0; margin-top: 3px; }
    .reason-dot.high   { color: var(--danger); }
    .reason-dot.medium { color: var(--warn); }
    .reason-dot.low    { color: var(--muted); }
    .reason-text { font-size: 10px; font-family: var(--mono); color: #8b93b0; line-height: 1.4; }

    /* ── Footer ── */
    .footer {
      padding: 10px 14px 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .scan-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: 7px 13px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .scan-btn:hover { border-color: var(--safe); color: var(--safe); }

    .reports-link {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      transition: color .2s;
      padding: 0;
    }
    .reports-link:hover { color: var(--danger); }

    .page-host {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: right;
    }

    /* ── Feed status bar ── */
    .feed-status {
      padding: 5px 14px;
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface, #0d0f14);
    }

    /* ── Database confirmed badge on link items ── */
    .db-confirmed-badge {
      display: inline-block;
      margin-left: 5px;
      padding: 1px 5px;
      background: rgba(255,60,90,.15);
      border: 1px solid rgba(255,60,90,.3);
      border-radius: 3px;
      font-size: 9px;
      color: var(--danger);
      font-family: var(--mono);
      vertical-align: middle;
      flex-shrink: 0;
    }

    .link-dot.confirmed {
      background: var(--danger);
      box-shadow: 0 0 8px var(--danger);
      width: 8px;
      height: 8px;
    }

    /* ── WHOIS block ── */
    .whois-block {
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px solid var(--border);
    }
    .whois-row {
      display: flex;
      gap: 6px;
      align-items: baseline;
      margin-bottom: 3px;
      font-family: var(--mono);
      font-size: 10px;
    }
    .whois-label { color: var(--muted); flex-shrink: 0; }
    .whois-value { color: #8b93b0; }
    .whois-value.red   { color: var(--danger); }
    .whois-value.green { color: var(--safe); }

    /* ── Report button ── */
    .report-section {
      margin: 0 14px 0;
      padding: 9px 12px;
      background: rgba(255,60,90,.04);
      border: 1px solid rgba(255,60,90,.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .report-label {
      font-size: 10px;
      color: var(--muted);
      font-family: var(--mono);
      flex: 1;
    }
    .report-btn {
      background: rgba(255,60,90,.1);
      border: 1px solid rgba(255,60,90,.3);
      color: var(--danger);
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .report-btn:hover { background: rgba(255,60,90,.2); }
    .report-btn.reported { background: rgba(74,81,104,.2); border-color: var(--border); color: var(--muted); cursor: default; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">🛡️</div>
    <div>
      <div class="header-title">Phishing Link Detector</div>
      <div class="header-sub">ML · XAI · Typosquatting · WHOIS · Database</div>
    </div>
  </div>

  <div class="feed-status" id="feedStatus">⏳ Loading phishing database…</div>

  <div id="modeBadge"></div>

  <div class="status idle" id="statusBanner">
    <div class="status-icon" id="statusIcon">⏳</div>
    <div>
      <div class="status-label scanning" id="statusLabel">Scanning…</div>
      <div class="status-desc" id="statusDesc">Analysing links on this page</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-n grey" id="totalCount">—</div>
      <div class="stat-l">Checked</div>
    </div>
    <div class="stat">
      <div class="stat-n red" id="flaggedCount">—</div>
      <div class="stat-l">Flagged</div>
    </div>
    <div class="stat">
      <div class="stat-n green" id="safeCount">—</div>
      <div class="stat-l">Safe</div>
    </div>
  </div>

  <div class="section-title" id="listLabel">FLAGGED LINKS — click to expand reasons</div>
  <div class="links-list" id="linksList">
    <div class="empty">Loading…</div>
  </div>

  <div class="report-section" id="reportSection" style="display:none;">
    <div class="report-label" id="reportLabel">Suspicious page? Report this domain to your personal blocklist.</div>
    <button class="report-btn" id="reportBtn">🚩 Report</button>
  </div>

  <div class="footer">
    <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-start">
      <button class="scan-btn" id="rescanBtn">↺ Rescan</button>
      <button class="reports-link" id="viewReportsBtn">🚩 View reported domains</button>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
